# ===========================================
# PRODUCTION - barbox-backend
# Deploy: ./scripts/fly-deploy.sh production
# ===========================================
# See https://fly.io/docs/reference/configuration/

app = 'barbox-backend'
primary_region = 'ord'

[build]
  dockerfile = 'Dockerfile'

[env]
  ENV = 'prod'
  SQLITE_PATH = '/data/app.db'

[[mounts]]
  source = 'barbox_data'
  destination = '/data'
  initial_size = '1gb'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/alive'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
