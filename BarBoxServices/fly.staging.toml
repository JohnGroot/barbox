# ===========================================
# STAGING - barbox-backend-staging
# Deploy: ./scripts/fly-deploy.sh staging
# ===========================================

app = 'barbox-backend-staging'
primary_region = 'ord'

[build]
  dockerfile = 'Dockerfile'

[env]
  ENV = 'prod'  # Uses production settings (staging differs only in app name/volume)
  SQLITE_PATH = '/data/app.db'

[[mounts]]
  source = 'barbox_data_staging'
  destination = '/data'
  initial_size = '1gb'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/alive'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
